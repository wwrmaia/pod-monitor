apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-monitor-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pod-monitor.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-monitor-role
  labels:
    {{- include "pod-monitor.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes", "persistentvolumeclaims",
                "services", "endpoints", "configmaps", "secrets", "serviceaccounts",
                "resourcequotas", "limitranges"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-monitor-binding
  labels:
    {{- include "pod-monitor.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: pod-monitor-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: pod-monitor-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-monitor-admin-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pod-monitor.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-monitor-admin-binding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pod-monitor.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: pod-monitor-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: pod-monitor-admin-role
  apiGroup: rbac.authorization.k8s.io
