{{- $useSocketProxy := and .Values.backend.docker.enabled .Values.backend.docker.socketProxy.enabled }}
{{- $pgSecretName := .Values.postgres.existingSecret | default "postgres-secret" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pod-monitor.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: pod-monitor-sa
      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.image.pullSecrets | nindent 8 }}
      {{- end }}
      {{- if .Values.securityContext.backend }}
      securityContext:
        {{- toYaml .Values.securityContext.backend | nindent 8 }}
      {{- end }}
      {{- if .Values.backend.docker.enabled }}
      volumes:
        {{- range .Values.backend.docker.sockets }}
        - name: {{ .name }}
          hostPath:
            path: {{ .hostPath }}
        {{- end }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "pod-monitor.backend.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $pgSecretName }}
                  key: DATABASE_URL
            {{- if .Values.backend.jwtSecret.existingSecret }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.jwtSecret.existingSecret }}
                  key: {{ .Values.backend.jwtSecret.secretKey }}
            {{- end }}
            {{- if .Values.backend.frontendOrigin }}
            - name: FRONTEND_ORIGIN
              value: {{ .Values.backend.frontendOrigin | quote }}
            {{- end }}
            {{- if .Values.backend.docker.enabled }}
            - name: DOCKER_HOSTS
              value: {{ .Values.backend.docker.hosts | quote }}
            {{- end }}
            {{- with .Values.backend.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if and .Values.backend.docker.enabled (not $useSocketProxy) }}
          volumeMounts:
            {{- /* Sem socket proxy: monta sockets diretamente no backend (não recomendado) */ -}}
            {{- range .Values.backend.docker.sockets }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30

        {{- if $useSocketProxy }}
        # ── Sidecar: Docker Socket Proxy ──────────────────────────────────────
        # Expõe apenas os endpoints Docker necessários em tcp://localhost:2375.
        # O backend nunca monta o docker.sock diretamente.
        - name: docker-socket-proxy
          image: {{ .Values.backend.docker.socketProxy.image }}
          env:
            {{- range $key, $val := .Values.backend.docker.socketProxy.allowedEndpoints }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          ports:
            - containerPort: 2375
          volumeMounts:
            {{- range .Values.backend.docker.sockets }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
            {{- end }}
          resources:
            {{- toYaml .Values.backend.docker.socketProxy.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pod-monitor.labels" . | nindent 4 }}
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
