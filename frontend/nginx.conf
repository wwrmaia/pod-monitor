server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    # Impede que a aplicação seja embutida em iframes (clickjacking)
    add_header X-Frame-Options "DENY" always;
    # Impede que o browser interprete arquivos com MIME type diferente do declarado
    add_header X-Content-Type-Options "nosniff" always;
    # Limita informações de referrer enviadas a outros domínios
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Desabilita acesso a câmera, microfone e geolocalização pela aplicação
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Content Security Policy: restringe origens de scripts, estilos e conexões
    # - default-src 'self': apenas recursos da mesma origem por padrão
    # - style-src 'unsafe-inline': React/Recharts usam estilos inline
    # - style-src fonts.googleapis.com: stylesheet do Google Fonts (Inter/Space Grotesk)
    # - font-src fonts.gstatic.com: arquivos .woff2 referenciados por esse stylesheet
    # - img-src data: blob:: QR codes MFA são data URIs; blobs para downloads
    # - connect-src 'self': chamadas de API e SSE apenas para a mesma origem
    # - frame-ancestors 'none': equivalente ao X-Frame-Options DENY no fetch
    # - object-src 'none': bloqueia plugins Flash/Java
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'none'; object-src 'none';" always;

    location /api/ {
        proxy_pass http://${BACKEND_HOST}:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
